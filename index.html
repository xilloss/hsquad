<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuesoSquad</title>
    <link rel="icon" href="images/logo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="topbar">
        <img class="topbar-logo" src="images/biglogo.png" alt="Логотип">
    </div>
    <div class="container">
        <img src="images/biglogo.png" alt="Logo">
        <p class="description">Страница готовится к выпуску</p>
    </div>


</body>
</html>

<script>

(function() {
    const currentPath = window.location.pathname;
    
    const validUrls = [
        '/',
        '/index.html',
        '/information/',
        '/information/sanctions.html',
        '/information/index.html',
        '/images/',
        '/style.css'
    ];
    

    const hasExtension = /\.(html|css|js|png|jpg|jpeg|gif|svg|ico)$/i.test(currentPath);
    
    if (!hasExtension && !validUrls.includes(currentPath) && currentPath !== '/404.html') {

        window.location.href = '/404.html?redirect=' + encodeURIComponent(currentPath);
    }
})();
</script>
