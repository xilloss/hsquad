<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuesoSquad - 404</title>
    <link rel="icon" href="/images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Science+Gothic:wght@100..900&display=swap');

        ::selection {
          background: #ea5c10;
          color: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            padding-top: 70px;
            font-family: 'Science Gothic', sans-serif;
            background-color: rgb(27, 18, 12);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: rgb(10, 7, 5);
            box-shadow: 0 2px 10px rgba(223, 223, 223, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .topbar-logo {
            height: 80%;
            max-width: auto;
            object-fit: contain;
            pointer-events: auto;
        }


        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            max-width: 100%;
        }


        .container img {
            max-width: 100%;
            height: auto;
            display: block;
            margin-bottom: 20px;
        }


        .description {
            font-size: 35px;
            color: #ffffff;
            line-height: 1.5;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .topbar {
                height: 55px;
            }

            body {
                padding-top: 55px;
            }

            .description {
                font-size: 16px;
                padding: 0 15px;
            }

            .container img {
                margin-bottom: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <img class="topbar-logo" src="/images/biglogo.png" alt="Логотип">
    </div>
    <div class="container">
        <img src="/images/404.png" alt="404">
        <p class="description">Страница не найдена.</p>
    </div>
</body>

</html>
